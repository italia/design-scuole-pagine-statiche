name: PR Comment (preview URL)

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write

jobs:
  comment-preview:
    runs-on: ubuntu-latest
    if: github.repository == 'RedTurtle/design-scuole-pagine-statiche'
    steps:
      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const branch = pr.head.ref;
            const url = `https://${process.env.GITHUB_REPOSITORY_OWNER}.github.io/${process.env.GITHUB_REPOSITORY.split('/')[1]}/previews/${branch}/`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `Preview available: ${url}`
            });
