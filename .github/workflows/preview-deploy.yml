name: Preview Deploy (branch)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  preview:
    if: github.repository == 'RedTurtle/design-scuole-pagine-statiche' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & pnpm (via composite)
        uses: ./.github/actions/node_env_setup
        with:
          node-version-file: .nvmrc
          pnpm-version: '10'
          install-dependencies: 'true'
      - name: Build
        run: pnpm build

      - name: Ensure HTML in dist root
        run: node ./scripts/move-pages-to-root.cjs || true

      - name: Inspect dist output
        run: |
          echo "Dist folder listing:";
          if [ ! -d ./dist ]; then
            echo "ERROR: ./dist does not exist";
            ls -la || true;
            exit 1;
          fi
          echo "Contents of ./dist:";
          ls -la ./dist || true;
          if [ -z "$(ls -A ./dist)" ]; then
            echo "ERROR: ./dist is empty — build didn't output files or postbuild didn't copy pages.";
            exit 1;
          fi

      - name: Prepare preview folder name
        id: vars
        run: |
          BRANCH=${GITHUB_REF##*/}
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Deploy preview to gh-pages/<branch>
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: previews/${{ steps.vars.outputs.branch }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'ci(preview): deploy ${{ steps.vars.outputs.branch }} preview'
      # Commenting on the PR is handled by a separate `pull_request_target` workflow
      # to avoid permission issues for PRs from forks.
